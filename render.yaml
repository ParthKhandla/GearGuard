services:
  - type: web
    name: gearguard-backend
    env: node
    region: oregon
    plan: free
    
    # Build command - installs dependencies (which triggers prisma generate via postinstall) and runs migrations
    buildCommand: npm install && npm run migrate
    
    # Start command - runs the server directly with node
    startCommand: node Backend/src/index.js
    
    # Environment variables - configure in Render dashboard
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000
      
    # Disk setup (optional - for file uploads)
    disk:
      name: gearguard-disk
      mountPath: /var/data
      sizeGB: 1
